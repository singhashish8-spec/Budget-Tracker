name: Publish OTA web bundle

# Builds the web layer and publishes the over-the-air update files (the bundle
# zip + latest.json) to the TOP OF MAIN, which is where GitHub Pages serves this
# repo from. Runs automatically whenever the web layer changes on main, and can
# also be run by hand from the Actions tab (Run workflow).
#
# Why commit to main root instead of using the newer "GitHub Actions" Pages
# deployment: this repo's Pages source is "Deploy from a branch: main /(root)",
# so only files committed there are actually served. Keeping the files here also
# means a later source push can't silently wipe them — this job re-publishes them.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'web-version.txt'
      - 'vite.config.js'
      - 'package.json'
      - 'scripts/build-ota.mjs'
      - '.github/workflows/deploy-ota.yml'
  workflow_dispatch:

# Needs to push the built files back to main.
permissions:
  contents: write

# Never run two publishes at once.
concurrency:
  group: ota-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # --legacy-peer-deps: one native plugin (capacitor-sms-inbox) pins an older
      # @capacitor/core peer; it doesn't affect the web build.
      - run: npm install --legacy-peer-deps --no-audit --no-fund

      - run: npm run build

      # Produces _site/latest.json and _site/budget-tracker-web-<version>.zip
      - run: node scripts/build-ota.mjs

      - name: Publish update files to main root (the Pages source)
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < web-version.txt)"
          # Publish only when the version actually changed. Builds aren't byte-for-byte
          # reproducible, so gate on latest.json (which changes only with the version),
          # not on the zip's bytes — otherwise every run would commit an identical-version
          # bundle. latest.json's content is driven solely by web-version.txt.
          cp "_site/latest.json" "./latest.json"
          git add latest.json
          if git diff --cached --quiet -- latest.json; then
            echo "Version ${VERSION} already live — nothing to publish."
            exit 0
          fi
          # Version changed: swap in the new bundle, dropping older ones so only
          # the current version is served.
          git rm --quiet --ignore-unmatch 'budget-tracker-web-*.zip' >/dev/null 2>&1 || true
          cp "_site/budget-tracker-web-${VERSION}.zip" "./budget-tracker-web-${VERSION}.zip"
          git add "budget-tracker-web-${VERSION}.zip"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Publish web bundle ${VERSION} (automated)"
          git push
          echo "Published version ${VERSION} to main root."
